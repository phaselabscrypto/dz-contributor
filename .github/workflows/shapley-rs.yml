name: shapley-rs CI

on:
  push:
    branches: [main]
    paths:
      - "services/shapley-rs/**"
      - ".github/workflows/shapley-rs.yml"
  pull_request:
    paths:
      - "services/shapley-rs/**"
      - ".github/workflows/shapley-rs.yml"

# Single CI run per ref — cancel any stale runs.
concurrency:
  group: shapley-rs-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: services/shapley-rs
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: nightly-2026-05-26
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/shapley-rs/target
          key: shapley-rs-${{ runner.os }}-${{ hashFiles('services/shapley-rs/Cargo.toml') }}
          restore-keys: |
            shapley-rs-${{ runner.os }}-

      # fmt is advisory (warning-only) until we have a local pre-commit
      # hook running rustfmt. Blocking on it adds churn without much
      # value when the underlying code compiles + passes clippy.
      - name: cargo fmt (advisory)
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --release

  docker:
    name: docker build (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build container
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: services/shapley-rs
          file: services/shapley-rs/Dockerfile
          push: false
          tags: dz-shapley-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: web CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "services/**"
      - ".github/workflows/shapley-rs.yml"
  pull_request:
    paths-ignore:
      - "services/**"
      - ".github/workflows/shapley-rs.yml"

permissions:
  contents: read

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint · typecheck · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
        env:
          # Avoid the build trying to call upstream sources during prerender.
          NODE_ENV: production
